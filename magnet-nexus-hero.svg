<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-opacity="0.4"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.5"/>

  <!-- Glow effects -->
  <ellipse cx="200" cy="150" rx="150" ry="150" fill="#4776E6" opacity="0.15" filter="url(#glow)"/>
  <ellipse cx="1000" cy="550" rx="200" ry="200" fill="#8E54E9" opacity="0.1" filter="url(#glow)"/>

  <!-- Primary Screen: Endpoints Dashboard -->
  <g transform="translate(200, 110)" filter="url(#shadow)">
    <!-- Screen container -->
    <rect width="700" height="450" rx="12" fill="#f5f5f5"/>

    <!-- Screen header -->
    <rect width="700" height="50" rx="12" fill="#ffffff"/>
    <rect y="50" width="700" height="1" fill="#e0e0e0"/>

    <!-- Header content -->
    <text x="20" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1a202c">Endpoints</text>
    <rect x="115" y="17" width="45" height="22" rx="11" fill="#4776E6"/>
    <text x="127" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">10</text>

    <!-- Table content -->
    <rect y="50" width="700" height="400" fill="#fafafa"/>

    <!-- Table rows -->
    <g transform="translate(20, 70)">
      <!-- Row 1 -->
      <rect width="660" height="42" rx="6" fill="#ffffff"/>
      <rect x="15" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
      <rect x="110" y="17" width="120" height="8" rx="4" fill="#d1d5db"/>
      <rect x="245" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
      <rect x="340" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
      <rect x="435" y="12" width="90" height="18" rx="6" fill="#dbeafe"/>
      <text x="455" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e40af">Collecting</text>
      <rect x="540" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>

      <!-- Row 2 -->
      <g transform="translate(0, 50)">
        <rect width="660" height="42" rx="6" fill="#ffffff"/>
        <rect x="15" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="110" y="17" width="120" height="8" rx="4" fill="#d1d5db"/>
        <rect x="245" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="340" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="435" y="12" width="60" height="18" rx="6" fill="#e5e7eb"/>
        <text x="450" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6b7280">Idle</text>
        <rect x="540" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
      </g>

      <!-- Row 3 -->
      <g transform="translate(0, 100)">
        <rect width="660" height="42" rx="6" fill="#ffffff"/>
        <rect x="15" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="110" y="17" width="120" height="8" rx="4" fill="#d1d5db"/>
        <rect x="245" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="340" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="435" y="12" width="60" height="18" rx="6" fill="#e5e7eb"/>
        <text x="450" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6b7280">Idle</text>
        <rect x="540" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
      </g>

      <!-- Row 4 -->
      <g transform="translate(0, 150)">
        <rect width="660" height="42" rx="6" fill="#ffffff"/>
        <rect x="15" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="110" y="17" width="120" height="8" rx="4" fill="#d1d5db"/>
        <rect x="245" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="340" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="435" y="12" width="70" height="18" rx="6" fill="#fed7aa"/>
        <text x="451" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#c2410c">Offline</text>
        <rect x="540" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
      </g>

      <!-- Row 5 -->
      <g transform="translate(0, 200)">
        <rect width="660" height="42" rx="6" fill="#ffffff"/>
        <rect x="15" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="110" y="17" width="120" height="8" rx="4" fill="#d1d5db"/>
        <rect x="245" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="340" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="435" y="12" width="70" height="18" rx="6" fill="#fed7aa"/>
        <text x="451" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#c2410c">Offline</text>
        <rect x="540" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
      </g>

      <!-- Row 6 -->
      <g transform="translate(0, 250)">
        <rect width="660" height="42" rx="6" fill="#ffffff"/>
        <rect x="15" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="110" y="17" width="120" height="8" rx="4" fill="#d1d5db"/>
        <rect x="245" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="340" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
        <rect x="435" y="12" width="90" height="18" rx="6" fill="#dbeafe"/>
        <text x="455" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e40af">Collecting</text>
        <rect x="540" y="17" width="80" height="8" rx="4" fill="#d1d5db"/>
      </g>
    </g>
  </g>

  <!-- Secondary Screen: Collection Modal -->
  <g transform="translate(720, 190)" filter="url(#shadow)">
    <!-- Screen container -->
    <rect width="420" height="300" rx="12" fill="#f5f5f5"/>

    <!-- Modal -->
    <g transform="translate(30, 30)">
      <rect width="360" height="240" rx="10" fill="#ffffff"/>

      <!-- Modal content -->
      <text x="25" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1a202c">Create collections</text>

      <!-- Memory section -->
      <text x="25" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#4b5563">Memory</text>

      <rect x="25" y="80" width="40" height="30" rx="4" fill="#4776E6"/>
      <rect x="75" y="91" width="200" height="8" rx="4" fill="#d1d5db"/>

      <rect x="25" y="118" width="40" height="30" rx="4" fill="#4776E6"/>
      <rect x="75" y="129" width="180" height="8" rx="4" fill="#d1d5db"/>

      <!-- Artifacts section -->
      <text x="25" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#4b5563">Artifacts</text>

      <rect x="25" y="185" width="40" height="30" rx="4" fill="#4776E6"/>
      <rect x="75" y="196" width="160" height="8" rx="4" fill="#d1d5db"/>

      <!-- Buttons -->
      <rect x="25" y="225" width="155" height="35" rx="6" fill="#f3f4f6"/>
      <text x="85" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#6b7280">Cancel</text>

      <rect x="190" y="225" width="155" height="35" rx="6" fill="#4776E6"/>
      <text x="242" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Create</text>
    </g>
  </g>
</svg>