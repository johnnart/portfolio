<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-opacity="0.3"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(16,185,129,0.1)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.3"/>

  <!-- Glow effects -->
  <ellipse cx="250" cy="180" rx="180" ry="180" fill="#10b981" opacity="0.08" filter="url(#glow)"/>
  <ellipse cx="950" cy="500" rx="200" ry="200" fill="#34d399" opacity="0.06" filter="url(#glow)"/>

  <!-- AI Brain/Network visualization (top right) -->
  <g transform="translate(850, 80)" opacity="0.2">
    <circle cx="50" cy="50" r="6" fill="#10b981"/>
    <circle cx="90" cy="40" r="5" fill="#34d399"/>
    <circle cx="110" cy="70" r="4" fill="#10b981"/>
    <circle cx="80" cy="90" r="5" fill="#34d399"/>
    <circle cx="30" cy="80" r="4" fill="#10b981"/>
    <circle cx="20" cy="50" r="5" fill="#34d399"/>

    <line x1="50" y1="50" x2="90" y2="40" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    <line x1="50" y1="50" x2="110" y2="70" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    <line x1="50" y1="50" x2="80" y2="90" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    <line x1="50" y1="50" x2="30" y2="80" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    <line x1="50" y1="50" x2="20" y2="50" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Center Screen: Adaptive Dashboard -->
  <g transform="translate(130, 100)" filter="url(#shadow)">
    <!-- Main screen -->
    <rect width="940" height="480" rx="16" fill="#f5f5f5"/>

    <!-- Header with AI indicator -->
    <rect x="1" y="1" width="938" height="60" rx="15" fill="#ffffff"/>
    <rect x="1" y="60" width="938" height="1" fill="#e0e0e0"/>

    <!-- AI Badge -->
    <rect x="30" y="18" width="120" height="28" rx="14" fill="url(#greenGradient)"/>
    <text x="54" y="37" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff">⚡ AI Active</text>

    <!-- Role selector -->
    <rect x="780" y="18" width="130" height="28" rx="6" fill="#e8f8f3" stroke="#10b981" stroke-width="1"/>
    <text x="845" y="37" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#047857" text-anchor="middle">Investigator</text>

    <!-- Content area -->
    <rect x="1" y="61" width="938" height="418" fill="#fafafa"/>

    <g transform="translate(30, 80)">
      <!-- AI Insight Card -->
      <rect width="880" height="80" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
      <circle cx="25" cy="40" r="8" fill="#10b981"/>
      <text x="45" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#047857">AI Insight</text>
      <text x="45" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7280">Priority case requires attention: Anomalous activity detected in endpoint logs</text>

      <!-- Content bars -->
      <rect y="100" width="880" height="8" rx="4" fill="#e5e7eb"/>
      <rect y="100" width="680" height="8" rx="4" fill="url(#greenGradient)" opacity="0.8"/>

      <rect y="120" width="880" height="8" rx="4" fill="#e5e7eb"/>
      <rect y="120" width="520" height="8" rx="4" fill="#34d399" opacity="0.7"/>

      <!-- Cards Grid -->
      <g transform="translate(0, 150)">
        <!-- Card 1 -->
        <rect width="280" height="180" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <rect x="15" y="15" width="80" height="8" rx="4" fill="#34d399"/>
        <rect x="15" y="35" width="250" height="6" rx="3" fill="#e5e7eb"/>
        <rect x="15" y="50" width="200" height="6" rx="3" fill="#e5e7eb"/>
        <rect x="15" y="65" width="220" height="6" rx="3" fill="#e5e7eb"/>

        <rect x="15" y="90" width="250" height="40" rx="6" fill="#f9fafb"/>
        <circle cx="30" cy="110" r="5" fill="#10b981"/>
        <rect x="45" y="103" width="140" height="5" rx="2" fill="#34d399" opacity="0.5"/>
        <rect x="45" y="115" width="100" height="4" rx="2" fill="#d1d5db"/>

        <rect x="15" y="145" width="100" height="24" rx="6" fill="#10b981"/>
        <text x="65" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Review</text>

        <!-- Card 2 -->
        <g transform="translate(300, 0)">
          <rect width="280" height="180" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
          <rect x="15" y="15" width="100" height="8" rx="4" fill="#14b8a6"/>
          <rect x="15" y="35" width="250" height="6" rx="3" fill="#e5e7eb"/>
          <rect x="15" y="50" width="180" height="6" rx="3" fill="#e5e7eb"/>
          <rect x="15" y="65" width="240" height="6" rx="3" fill="#e5e7eb"/>

          <rect x="15" y="90" width="250" height="40" rx="6" fill="#f9fafb"/>
          <circle cx="30" cy="110" r="5" fill="#14b8a6"/>
          <rect x="45" y="103" width="160" height="5" rx="2" fill="#2dd4bf" opacity="0.5"/>
          <rect x="45" y="115" width="120" height="4" rx="2" fill="#d1d5db"/>

          <rect x="15" y="145" width="100" height="24" rx="6" fill="#14b8a6"/>
          <text x="65" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Analyze</text>
        </g>

        <!-- Card 3 -->
        <g transform="translate(600, 0)">
          <rect width="280" height="180" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
          <rect x="15" y="15" width="90" height="8" rx="4" fill="#5eead4"/>
          <rect x="15" y="35" width="230" height="6" rx="3" fill="#e5e7eb"/>
          <rect x="15" y="50" width="210" height="6" rx="3" fill="#e5e7eb"/>
          <rect x="15" y="65" width="190" height="6" rx="3" fill="#e5e7eb"/>

          <rect x="15" y="90" width="250" height="40" rx="6" fill="#f9fafb"/>
          <circle cx="30" cy="110" r="5" fill="#14b8a6"/>
          <rect x="45" y="103" width="120" height="5" rx="2" fill="#5eead4" opacity="0.5"/>
          <rect x="45" y="115" width="90" height="4" rx="2" fill="#d1d5db"/>

          <rect x="15" y="145" width="100" height="24" rx="6" fill="#14b8a6"/>
          <text x="65" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Export</text>
        </g>
      </g>
    </g>
  </g>
</svg>